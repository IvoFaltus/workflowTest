name: Weather Report

on:
  schedule:
    - cron: "* * * * *"
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch weather
        run: |
          CITY="LONDON"
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")

          echo "Weather in $CITY: $WEATHER"

          echo "## $CITY Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$WEATHER**" >> $GITHUB_STEP_SUMMARY
          echo "Weather in $CITY: $WEATHER" >> file.txt

      - uses: actions/upload-artifact@4
        with:
          name: file
          path: file.txt
